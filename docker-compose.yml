services:
  frontend:
    build: ./client
    container_name: TimeCell_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    stdin_open: true
    tty: true

  backend:
    build: ./server
    container_name: TimeCell_backend
    ports:
      - "5000:5000"
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=TimeCell_db
    volumes:
      - ./server:/app
    restart: always

  db:
    image: mysql:8
    container_name: TimeCell_database
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: TimeCell_db
    volumes:
      - TimeCell_data:/var/lib/mysql
    restart: always

volumes:
  TimeCell_data: