services:
# ─── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./client
      args:
        REACT_APP_API_URL: http://localhost:5000
        REACT_APP_WS_URL: ws://localhost:8000/ws
    container_name: timecell_frontend
    ports:
      - "3000:3000"
    environment:
      HOST: "0.0.0.0"
    depends_on:
      - backend
    restart: unless-stopped
    stdin_open: true
    tty: true

# ─── Backend ────────────────────────────────────────────────────────────────
  backend:
    build: ./server
    container_name: timecell_backend
    ports:
      - "5000:5000"
    volumes:
      - uploads_data:/app/uploads
    environment:
      - PORT=5000 
      - JWT_SECRET=supersecretkey
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=1234
      - DB_NAME=TimeCell_db
      - CLIENT_URL=http://localhost:3000
      - AI_URL=http://ai:8000
      - AI_WS_URL=ws://ai:8000    
    depends_on:
      db:
        condition: service_healthy
      ai:
        condition: service_healthy
    restart: always

# ─── Database ────────────────────────────────────────────────────────────────
  db:
    image: mysql:8
    container_name: timecell_db
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: TimeCell_db
    volumes:
      - timecell_data:/var/lib/mysql
      - ./server/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      start_period: 15s
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always
    
# ─── AI ──────────────────────────────────────────────────────────────────────
  ai:
    build:
      context: ./ai
      dockerfile: Dockerfile
    container_name: timecell_ai
    ports:
      - "8000:8000"
    environment:
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5000
      - YOLO_MODEL_PATH=models/best.pt
      - CLASSIFICATION_MODEL_PATH=models/model.h5
      - CLASSIFICATION_LABELS_PATH=models/labels.json

      - DATABASE_URL=mysql+pymysql://root:1234@db:3306/TimeCell_db
      - STATIC_DIR=/app/static
      - CLIENT_URL=http://localhost:3000
    volumes:
      - ./ai/models:/app/models:ro
      - ai_static_data:/app/static
    depends_on:
      db:
        condition: service_healthy   
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      start_period: 20s
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

# ───────────────────────────────────────────────────────────────────────────────

volumes:
  timecell_data:
  uploads_data:
  ai_static_data: 